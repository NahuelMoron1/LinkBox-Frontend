<?xml version="1.0" encoding="UTF-8"?>
<svg width="520" height="110" viewBox="0 0 520 110"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="520" height="110" rx="6" fill="#080808"/>

  <!-- Left accent bar -->
  <rect x="0" y="18" width="3" height="74" rx="1.5" fill="#00ff88" opacity="0.7"/>

  <!-- LINKBOX text -->
  <text
    x="28"
    y="73"
    font-family="'Rajdhani', 'Verdana', 'Arial', sans-serif"
    font-weight="700"
    font-size="54"
    fill="#ffffff"
    letter-spacing="10"
  >LINKBOX</text>

  <!-- Brand dot — green, no extra letter-spacing -->
  <text
    x="355"
    y="73"
    font-family="'Rajdhani', 'Verdana', 'Arial', sans-serif"
    font-weight="700"
    font-size="54"
    fill="#00ff88"
    letter-spacing="0"
  >.</text>

  <!-- Subtle baseline rule -->
  <line x1="28" y1="88" x2="388" y2="88"
        stroke="#00ff88" stroke-width="1" opacity="0.14"/>

</svg>
