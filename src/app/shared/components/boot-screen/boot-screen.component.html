<div class="boot-screen" [class.fade-out]="fadingOut">

  <!-- Scan line sweep -->
  <div class="scan-line"></div>

  <!-- Background decorative arc (GT3 gauge style) -->
  <svg class="bg-arc" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
    <circle cx="350" cy="350" r="300" fill="none" stroke="#00ff88" stroke-width="0.5" stroke-dasharray="6 10" opacity="0.07"/>
    <circle cx="350" cy="350" r="250" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.04"/>
    <!-- Tick marks like a gauge -->
    <g stroke="#00ff88" stroke-width="1" opacity="0.1">
      <line x1="350" y1="52" x2="350" y2="72"/>
      <line x1="497" y1="98" x2="487" y2="115"/>
      <line x1="597" y1="242" x2="580" y2="250"/>
      <line x1="600" y1="413" x2="582" y2="407"/>
      <line x1="497" y1="558" x2="487" y2="541"/>
      <line x1="350" y1="608" x2="350" y2="628"/>
      <line x1="203" y1="558" x2="213" y2="541"/>
      <line x1="103" y1="413" x2="121" y2="407"/>
      <line x1="100" y1="242" x2="118" y2="250"/>
      <line x1="203" y1="98" x2="213" y2="115"/>
    </g>
    <!-- Sweeping arc animation -->
    <circle class="sweep-arc" cx="350" cy="350" r="300" fill="none"
            stroke="#00ff88" stroke-width="2" stroke-linecap="round"
            stroke-dasharray="1885" stroke-dashoffset="1885"
            transform="rotate(-90 350 350)"/>
  </svg>

  <!-- Corner HUD brackets -->
  <div class="corner top-left"></div>
  <div class="corner top-right"></div>
  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>

  <!-- Main centered content -->
  <div class="boot-content">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="logo-horizontal.svg" alt="LinkBox" class="logo-img"/>
    </div>

    <!-- Separator line -->
    <div class="separator"></div>

    <!-- Progress bar -->
    <div class="progress-area">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-labels">
        <span class="initializing-label">INITIALIZING SYSTEMS</span>
        <span class="pct-label">100%</span>
      </div>
    </div>

    <!-- Status checklist -->
    <ul class="status-list">
      <li class="s1"><span class="tick">&#x2713;</span>ECU ONLINE</li>
      <li class="s2"><span class="tick">&#x2713;</span>SENSORS CALIBRATED</li>
      <li class="s3"><span class="tick">&#x2713;</span>RPM SIGNAL LOCK</li>
      <li class="s4"><span class="tick">&#x2713;</span>TELEMETRY LINK ESTABLISHED</li>
      <li class="s5 ready"><span class="tick">&#x2713;</span>DASHBOARD READY</li>
    </ul>

  </div>

  <!-- Bottom info bar -->
  <div class="bottom-bar">
    <span>LINKBOX DASHBOARD&nbsp;&nbsp;v2.0</span>
    <span>BUILD 2025.1</span>
  </div>

</div>
