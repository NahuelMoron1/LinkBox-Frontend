<div class="dashboard-wrapper">

  <app-rpm-led-strip [rpm]="data.rpm || 0" [shiftRpm]="SHIFT_RPM"></app-rpm-led-strip>

  <div class="style-selector">
    <span class="status-badge" [ngClass]="isLive ? 'live' : 'offline'">
      <span class="status-dot"></span>{{ isLive ? ('dash.live' | translate) : ('dash.offline' | translate) }}
    </span>
    <div class="style-btns">
      <button class="style-btn" [class.active]="selectedStyle === 'gt3'"     (click)="setStyle('gt3')">{{ 'dash.gt3' | translate }}</button>
      <button class="style-btn" [class.active]="selectedStyle === 'classic'" (click)="setStyle('classic')">{{ 'dash.classic' | translate }}</button>
    </div>
  </div>

  <app-gt3-layout
    *ngIf="selectedStyle === 'gt3'"
    [data]="data"
    [plan]="plan"
    [isLive]="isLive"
    [editingSensor]="editingSensor"
    (configToggle)="toggleSensorConfig($event)"
  ></app-gt3-layout>

  <app-classic-layout
    *ngIf="selectedStyle === 'classic'"
    [data]="data"
    [plan]="plan"
    [isLive]="isLive"
    [editingSensor]="editingSensor"
    (configToggle)="toggleSensorConfig($event)"
  ></app-classic-layout>

  <app-alert-threshold-config
    *ngIf="plan === 'ultimate' && editingSensor"
    [sensorLabelKey]="editingSensorLabelKey"
    [sensorUnit]="getSensorUnit(editingSensor!)"
    [editValues]="editValues"
    (closed)="editingSensor = null"
    (saved)="onThresholdSaved($event)"
    (resetted)="resetSensorConfig()"
  ></app-alert-threshold-config>


</div>
