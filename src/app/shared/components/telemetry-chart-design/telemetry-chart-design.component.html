<div class="chart-container">
  <div class="chart-header">
    <button (click)="prevMetric()">&lt;</button>
    <span class="active-metric">{{ currentMetricLabel }}</span>
    <button (click)="nextMetric()">&gt;</button>
    <button class="reset-btn" (click)="resetZoom()">{{ 'chart.reset' | translate }}</button>
  </div>

  <div *ngIf="!hasData" class="placeholder">
    <span>{{ 'chart.noData' | translate }}</span>
  </div>

  <canvas
    #chartCanvas
    (mousedown)="handleMouseDown($event)"
    (mousemove)="handleMouseMove($event)"
    (mouseup)="handleMouseUp()"
    (mouseleave)="handleMouseLeave()"
    (wheel)="handleMouseWheel($event)"
  ></canvas>
</div>
