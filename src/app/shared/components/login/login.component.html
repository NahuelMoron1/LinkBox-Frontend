<div class="main-container">
  <button class="floating-theme-btn" (click)="i18n.toggle()">{{ 'nav.langToggle' | translate }}</button>
  <button class="floating-theme-btn floating-theme-btn--right" (click)="themeService.toggle()">
    {{ themeService.isDark ? '◻ LIGHT' : '◼ DARK' }}
  </button>

  <div class="login-card">
    <div class="info-side">
      <div class="brand-block">
        <span class="brand-name">LINKBOX</span><span class="brand-dot">.</span>
      </div>
      <div class="welcome-block">
        <p class="welcome-label">{{ 'login.eyebrow' | translate }}</p>
        <h1>{{ 'login.welcome1' | translate }}<br />{{ 'login.welcome2' | translate }}</h1>
      </div>
    </div>

    <div class="form-side">
      <div class="form-header">
        <h2>{{ 'login.heading' | translate }}</h2>
        <p class="form-subtitle">{{ 'login.subtitle' | translate }}</p>
      </div>
      <div class="field-group">
        <label class="field-label">{{ 'login.keyLabel' | translate }}</label>
        <input type="text" class="field-input" [(ngModel)]="key"
               placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" />
      </div>
      <div class="field-group">
        <label class="field-label">{{ 'login.passLabel' | translate }}</label>
        <input type="password" class="field-input" [(ngModel)]="password" placeholder="••••••••" />
      </div>
      <button class="btn-login" (click)="onLogin()">{{ 'login.submit' | translate }}</button>
      <div class="divider"><span>{{ 'login.or' | translate }}</span></div>
      <button class="btn-access">{{ 'login.request' | translate }}</button>
    </div>
  </div>
</div>
