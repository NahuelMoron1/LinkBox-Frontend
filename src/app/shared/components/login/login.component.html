<div class="main-container">
  <div class="login-card">

    <!-- LEFT: branding / image -->
    <div class="info-side">
      <div class="brand-block">
        <span class="brand-name">LINKBOX</span>
        <span class="brand-dot">.</span>
      </div>
      <div class="welcome-block">
        <p class="welcome-label">TELEMETRY COMMAND CENTER</p>
        <h1>WELCOME<br />BACK</h1>
      </div>
    </div>

    <!-- RIGHT: form -->
    <div class="form-side">
      <div class="form-header">
        <h2>ACCESS</h2>
        <p class="form-subtitle">Enter your credentials to continue</p>
      </div>

      <div class="field-group">
        <label class="field-label">DEVICE KEY</label>
        <input
          type="text"
          class="field-input"
          [(ngModel)]="key"
          placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
          autocomplete="off"
        />
      </div>

      <div class="field-group">
        <label class="field-label">PASSWORD</label>
        <input
          type="password"
          class="field-input"
          [(ngModel)]="password"
          placeholder="••••••••"
        />
      </div>

      <button class="btn-login" (click)="onLogin()">LOG IN</button>

      <div class="divider"><span>OR</span></div>

      <button class="btn-access">REQUEST ACCESS</button>
    </div>

  </div>
</div>
